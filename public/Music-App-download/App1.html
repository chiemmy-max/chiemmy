<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppHub NG • Download Apps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        
        .app-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .app-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
        
        .modal {
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.7) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .screenshot {
            transition: transform 0.4s ease;
        }
        .screenshot:hover { transform: scale(1.08); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <!-- NAVBAR -->
    <nav class="bg-zinc-900 border-b border-zinc-800 fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-emerald-400 to-cyan-400 rounded-3xl flex items-center justify-center text-3xl shadow-inner">📱</div>
                <h1 class="logo-font text-4xl font-bold tracking-tighter text-white">AppHub<span class="text-emerald-400">NG</span></h1>
            </div>
            
            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="#" onclick="showSection('home')" class="hover:text-emerald-400 transition-colors">Home</a>
                <a href="#" onclick="showSection('apps')" class="hover:text-emerald-400 transition-colors active">Apps</a>
                <a href="#" class="hover:text-emerald-400 transition-colors">Categories</a>
                <a href="#" class="hover:text-emerald-400 transition-colors">Developers</a>
            </div>

            <div class="flex items-center gap-6">
                <div class="bg-zinc-800 px-5 py-2 rounded-3xl flex items-center gap-3 text-sm cursor-pointer hover:bg-zinc-700">
                    <i class="fa-solid fa-globe"></i>
                    <span>English</span>
                </div>
                <div class="w-9 h-9 bg-zinc-700 rounded-2xl overflow-hidden ring-2 ring-emerald-400">
                    <img src="https://picsum.photos/id/64/128/128" class="w-full h-full object-cover">
                </div>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <div id="home-section" class="pt-24">
        <div class="relative h-[85vh] flex items-center bg-[linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85)),url('https://picsum.photos/id/1015/2000/1200')] bg-cover bg-center">
            <div class="max-w-5xl mx-auto px-6 text-center">
                <div class="inline-flex items-center gap-2 bg-emerald-500/10 text-emerald-400 text-sm font-medium px-6 py-2 rounded-3xl mb-6">
                    <i class="fa-solid fa-bolt"></i>
                    2,450+ apps • Lagos, Nigeria
                </div>
                <h1 class="text-7xl font-bold tracking-tighter leading-none mb-6">
                    Download the Best<br>Apps for Naija
                </h1>
                <p class="text-2xl text-zinc-400 mb-10 max-w-2xl mx-auto">
                    Free Android & iOS apps • No ads • Made for Nigerians
                </p>
                <button onclick="showSection('apps')" 
                        class="bg-emerald-500 hover:bg-emerald-600 text-xl font-semibold px-12 py-6 rounded-3xl flex items-center gap-4 mx-auto transition-all active:scale-95">
                    <i class="fa-solid fa-download"></i>
                    Browse All Apps
                </button>
            </div>
        </div>
    </div>

    <!-- APPS SECTION -->
    <div id="apps-section" class="hidden pt-24 pb-20 max-w-7xl mx-auto px-6">
        <!-- Search + Categories -->
        <div class="flex flex-col md:flex-row gap-6 items-center mb-12">
            <div class="relative flex-1">
                <input id="search-input" 
                       onkeyup="filterApps()"
                       type="text" 
                       placeholder="Search apps like WhatsApp, TikTok, NaijaPay..." 
                       class="w-full bg-zinc-900 border border-zinc-700 focus:border-emerald-500 rounded-3xl px-8 py-6 text-lg outline-none">
                <i class="fa-solid fa-magnifying-glass absolute right-8 top-1/2 -translate-y-1/2 text-zinc-400"></i>
            </div>
            
            <div class="flex gap-3 flex-wrap" id="category-pills"></div>
        </div>

        <!-- Apps Grid -->
        <h2 class="text-3xl font-semibold mb-8 flex items-center gap-3">
            <span class="text-emerald-400">🔥</span> Trending in Nigeria
        </h2>
        <div id="apps-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8"></div>
    </div>

    <!-- APP DETAIL MODAL -->
    <div id="app-modal" onclick="if(event.target.id==='app-modal') closeModal()" 
         class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-6">
        <div class="modal bg-zinc-900 rounded-3xl max-w-4xl w-full max-h-[95vh] overflow-hidden flex flex-col">
            <!-- Header -->
            <div class="p-8 border-b border-zinc-800 flex items-start gap-6">
                <img id="modal-icon" src="" class="w-24 h-24 rounded-3xl shadow-2xl">
                <div class="flex-1 pt-2">
                    <h2 id="modal-title" class="text-4xl font-semibold"></h2>
                    <p id="modal-dev" class="text-emerald-400 text-xl"></p>
                    <div class="flex items-center gap-2 mt-3">
                        <div class="flex text-yellow-400 text-2xl">★★★★☆</div>
                        <span id="modal-rating" class="text-zinc-400">4.8 • 128k reviews</span>
                    </div>
                </div>
                <button onclick="closeModal()" class="text-4xl text-zinc-500 hover:text-white">×</button>
            </div>

            <!-- Screenshots -->
            <div class="p-8 bg-zinc-950 border-b border-zinc-800">
                <div class="flex gap-6 overflow-x-auto pb-6 snap-x snap-mandatory">
                    <img id="ss1" class="screenshot w-72 h-52 object-cover rounded-3xl snap-center shadow-xl" src="">
                    <img id="ss2" class="screenshot w-72 h-52 object-cover rounded-3xl snap-center shadow-xl" src="">
                    <img id="ss3" class="screenshot w-72 h-52 object-cover rounded-3xl snap-center shadow-xl" src="">
                </div>
            </div>

            <!-- Description & Download -->
            <div class="flex-1 p-8 overflow-auto">
                <p id="modal-desc" class="text-zinc-300 leading-relaxed text-lg"></p>
                
                <div class="mt-12 flex items-center justify-between border-t border-zinc-800 pt-8">
                    <div>
                        <div class="text-sm text-zinc-400">Size • Version</div>
                        <div class="text-2xl font-semibold">48.2 MB • v2.4.1</div>
                    </div>
                    <button onclick="startDownload()" 
                            class="bg-gradient-to-r from-emerald-500 to-cyan-400 hover:from-emerald-600 hover:to-cyan-500 text-black font-bold text-2xl px-16 py-6 rounded-3xl flex items-center gap-4 shadow-xl transition-all active:scale-95">
                        <i class="fa-solid fa-cloud-arrow-down"></i>
                        DOWNLOAD APK
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="hidden fixed bottom-8 right-8 bg-emerald-600 text-white px-8 py-5 rounded-3xl flex items-center gap-4 shadow-2xl text-lg">
        <i class="fa-solid fa-download"></i>
        <span id="toast-text" class="font-medium"></span>
    </div>

    <script>
        tailwind.config = { content: [] }

        let allApps = [
            {
                id: 1,
                name: "NaijaPay",
                dev: "LagosFin Tech",
                icon: "https://picsum.photos/id/237/400/400",
                category: "Finance",
                rating: "4.9",
                screenshots: ["https://picsum.photos/id/201/800/450", "https://picsum.photos/id/251/800/450", "https://picsum.photos/id/29/800/450"],
                desc: "Send money instantly, pay bills, buy airtime & data. The fastest mobile wallet in Nigeria."
            },
            {
                id: 2,
                name: "LagosRide",
                dev: "RideNG",
                icon: "https://picsum.photos/id/48/400/400",
                category: "Travel",
                rating: "4.7",
                screenshots: ["https://picsum.photos/id/1015/800/450", "https://picsum.photos/id/160/800/450", "https://picsum.photos/id/201/800/450"],
                desc: "Book rides across Lagos, Abuja & Port Harcourt. Real-time tracking & cashless payment."
            },
            {
                id: 3,
                name: "AfroTik",
                dev: "VibeMedia",
                icon: "https://picsum.photos/id/30/400/400",
                category: "Social",
                rating: "4.8",
                screenshots: ["https://picsum.photos/id/64/800/450", "https://picsum.photos/id/201/800/450", "https://picsum.photos/id/251/800/450"],
                desc: "Short videos, music & trending challenges from Nigeria and Africa."
            },
            {
                id: 4,
                name: "GidiMart",
                dev: "MarketHub NG",
                icon: "https://picsum.photos/id/1015/400/400",
                category: "Shopping",
                rating: "4.6",
                screenshots: ["https://picsum.photos/id/29/800/450", "https://picsum.photos/id/48/800/450", "https://picsum.photos/id/160/800/450"],
                desc: "Buy & sell from local vendors. Fast delivery in all major cities."
            },
            {
                id: 5,
                name: "ChurchLive",
                dev: "GospelNet",
                icon: "https://picsum.photos/id/201/400/400",
                category: "Lifestyle",
                rating: "5.0",
                screenshots: ["https://picsum.photos/id/251/800/450", "https://picsum.photos/id/1015/800/450", "https://picsum.photos/id/30/800/450"],
                desc: "Live services, sermons & worship from your favourite churches."
            },
            {
                id: 6,
                name: "ScoreNaija",
                dev: "SportsHub",
                icon: "https://picsum.photos/id/29/400/400",
                category: "Sports",
                rating: "4.8",
                screenshots: ["https://picsum.photos/id/201/800/450", "https://picsum.photos/id/48/800/450", "https://picsum.photos/id/160/800/450"],
                desc: "Live football scores, EPL, La Liga & NPFL updates."
            }
        ]

        let currentFilter = "All"
        let currentApp = null

        function renderCategoryPills() {
            const cats = ["All", "Finance", "Travel", "Social", "Shopping", "Lifestyle", "Sports"]
            const container = document.getElementById("category-pills")
            container.innerHTML = ""
            cats.forEach(cat => {
                const btn = document.createElement("button")
                btn.className = `px-8 py-3 rounded-3xl text-sm font-medium transition-all ${currentFilter === cat ? 'bg-emerald-500 text-black shadow-lg' : 'bg-zinc-800 hover:bg-zinc-700'}`
                btn.textContent = cat
                btn.onclick = () => {
                    currentFilter = cat
                    renderCategoryPills()
                    filterApps()
                }
                container.appendChild(btn)
            })
        }

        function renderApps(filteredApps) {
            const grid = document.getElementById("apps-grid")
            grid.innerHTML = ""
            
            filteredApps.forEach(app => {
                const card = document.createElement("div")
                card.className = "app-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer"
                card.innerHTML = `
                    <div class="relative">
                        <img src="${app.icon}" class="w-full h-52 object-cover">
                        <div class="absolute bottom-4 right-4 bg-black/70 text-xs px-4 py-1 rounded-3xl">${app.category}</div>
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="font-semibold text-xl">${app.name}</div>
                                <div class="text-zinc-400 text-sm">${app.dev}</div>
                            </div>
                            <div class="text-right">
                                <div class="flex text-amber-400">★★★★☆</div>
                                <div class="text-xs text-zinc-400">${app.rating}</div>
                            </div>
                        </div>
                    </div>
                `
                card.onclick = () => openAppModal(app)
                grid.appendChild(card)
            })
        }

        function filterApps() {
            const term = document.getElementById("search-input").value.toLowerCase().trim()
            
            let filtered = allApps
            
            if (currentFilter !== "All") {
                filtered = filtered.filter(a => a.category === currentFilter)
            }
            
            if (term) {
                filtered = filtered.filter(a => 
                    a.name.toLowerCase().includes(term) || 
                    a.dev.toLowerCase().includes(term)
                )
            }
            
            renderApps(filtered)
        }

        function openAppModal(app) {
            currentApp = app
            document.getElementById("app-modal").classList.remove("hidden")
            document.getElementById("modal-icon").src = app.icon
            document.getElementById("modal-title").textContent = app.name
            document.getElementById("modal-dev").textContent = app.dev
            document.getElementById("modal-desc").textContent = app.desc
            document.getElementById("ss1").src = app.screenshots[0]
            document.getElementById("ss2").src = app.screenshots[1]
            document.getElementById("ss3").src = app.screenshots[2]
        }

        function closeModal() {
            document.getElementById("app-modal").classList.add("hidden")
        }

        function startDownload() {
            if (!currentApp) return
            const toast = document.getElementById("toast")
            const text = document.getElementById("toast-text")
            text.innerHTML = `Downloading <span class="font-bold">${currentApp.name}</span> APK...`
            toast.classList.remove("hidden")
            
            setTimeout(() => {
                text.innerHTML = `✅ ${currentApp.name} downloaded! (Demo file)`
                setTimeout(() => toast.classList.add("hidden"), 3000)
            }, 2200)
        }

        function showSection(section) {
            document.getElementById("home-section").classList.add("hidden")
            document.getElementById("apps-section").classList.add("hidden")
            
            if (section === "home") {
                document.getElementById("home-section").classList.remove("hidden")
            } else if (section === "apps") {
                document.getElementById("apps-section").classList.remove("hidden")
                filterApps()
            }
        }

        // Initialize
        window.onload = () => {
            renderCategoryPills()
            renderApps(allApps)
            showSection("home")
            
            // Demo toast on load
            setTimeout(() => {
                const t = document.getElementById("toast")
                document.getElementById("toast-text").innerHTML = "Welcome to AppHub NG! 🎉"
                t.classList.remove("hidden")
                setTimeout(() => t.classList.add("hidden"), 4000)
            }, 1200)
        }
    </script>
</body>
</html>
